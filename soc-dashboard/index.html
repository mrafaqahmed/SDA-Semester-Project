<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA-Pro SOC Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #ff6b6b;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .dashboard-section {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .dashboard-section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #60a5fa;
            border-bottom: 2px solid #60a5fa;
            padding-bottom: 10px;
        }

        #metrics-dashboard {
            grid-column: 1 / -1;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            border-left: 3px solid #ff6b6b;
        }

        .metric-card h3 {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 32px;
            font-weight: bold;
            color: #4ade80;
        }

        .alert-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 3px solid #fbbf24;
            font-size: 13px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .alert-item.severity-CRITICAL {
            border-left-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .alert-item.severity-HIGH {
            border-left-color: #f97316;
            background: rgba(249, 115, 22, 0.1);
        }

        .alert-item.severity-MEDIUM {
            border-left-color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }

        .alert-item.severity-LOW {
            border-left-color: #84cc16;
            background: rgba(132, 204, 22, 0.1);
        }

        .timestamp {
            color: #94a3b8;
            font-family: monospace;
            font-size: 11px;
        }

        .source {
            background: rgba(96, 165, 250, 0.2);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
        }

        .incident-row {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 3px solid #60a5fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .incident-row.state-NEW {
            border-left-color: #60a5fa;
        }

        .incident-row.state-UNDER_TRIAGE {
            border-left-color: #fbbf24;
        }

        .incident-row.state-CONTAINMENT {
            border-left-color: #f97316;
        }

        .incident-row.state-ERADICATION {
            border-left-color: #ef4444;
        }

        .incident-row.state-CLOSED {
            border-left-color: #84cc16;
            opacity: 0.6;
        }

        .incident-row .id {
            color: #94a3b8;
            font-family: monospace;
            font-size: 11px;
            flex: 0.8;
        }

        .incident-row .title {
            flex: 1.5;
            color: #e2e8f0;
        }

        .incident-row .severity {
            flex: 0.5;
            text-align: center;
        }

        .incident-row .state {
            flex: 0.8;
            text-align: center;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        .scroll-container {
            max-height: 400px;
            overflow-y: auto;
        }

        .scroll-container::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        .scroll-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ SDA-Pro SOC Dashboard</h1>
            <div class="status">
                <div class="status-item">
                    <div class="status-dot"></div>
                    <span>All Services: Online</span>
                </div>
                <div class="status-item">
                    <span>Real-time Updates: Enabled</span>
                </div>
                <div class="status-item">
                    <span>Last Updated: <span id="last-update">Just now</span></span>
                </div>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Metrics Dashboard -->
            <div class="dashboard-section" id="metrics-dashboard">
                <h2>📊 Key Metrics</h2>
                <!-- Populated by MVC Controller -->
            </div>

            <!-- Alert Stream -->
            <div class="dashboard-section">
                <h2>⚠️ Alert Stream</h2>
                <div class="scroll-container" id="alert-stream">
                    <p>Waiting for alerts...</p>
                </div>
            </div>

            <!-- Incident Queue -->
            <div class="dashboard-section">
                <h2>🔴 Incident Queue</h2>
                <div class="scroll-container" id="incident-queue">
                    <p>No active incidents</p>
                </div>
            </div>

            <!-- Response Console -->
            <div class="dashboard-section">
                <h2>⚡ Response Actions</h2>
                <div id="response-console">
                    <p style="color: #94a3b8; font-size: 13px;">
                        Select an incident to execute response actions
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="dashboard-mvc.js"></script>
</body>
</html>
